<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С 8 Марта</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎵 Музыка на главной -->
<audio id="mainMusic" autoplay loop>
  <source src="music/main.mp3" type="audio/mpeg">
</audio>

<!--  Главный блок -->
<section class="hero">

  <div class="hero-overlay">
      <h1>С 8 Марта!</h1>

      <p class="greeting-text">
        Дорогие девушки, поздравляем вас с праздником!
        <br><br>
        Ниже — слова, которые идут прямо от души, чтобы сделать этот день ещё теплее.
      </p>
  </div>

</section>

<!-- 👨 Мужской коллектив -->
<section class="guys">

<h2>Личные поздравления</h2>

<div class="circle-container">

<a href="pages/guy1.html">
<img src="images/guy1.jpg" class="circle">
</a>

<a href="pages/guy2.html">
<img src="images/guy2.jpg" class="circle">
</a>

<a href="pages/guy3.html">
<img src="images/guy3.jpg" class="circle">
</a>

<a href="pages/guy4.html">
<img src="images/guy4.jpg" class="circle">
</a>

</div>
</section>

<!-- ✅ Гарантируем запуск музыки после первого клика (если браузер блокирует autoplay) -->
<script>
document.addEventListener("click", function () {
  const music = document.getElementById("mainMusic");
  if (music && music.paused) {
    music.volume = 0.4;   // можно убрать строку, если не нужно
    music.play();
  }
}, { once: true });
</script>

</body>
</html>
